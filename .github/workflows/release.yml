# Builds and submits the extension to Chrome Web Store and Firefox AMO.
#
# Triggers: pushing a tag like v1.0.1, or manual workflow_dispatch from
# the Actions tab. Tag-triggered runs verify the tag suffix matches
# extension/package.json's version and fail fast on mismatch.
#
# Before first use, run `pnpm submit:init` locally (in extension/) to
# write .env.submit, then copy the values from that file into your
# GitHub repo secrets using the names listed below.
#
# Required secrets:
#   Chrome Web Store:
#     CHROME_EXTENSION_ID   — assigned after first manual upload
#     CHROME_CLIENT_ID      — from Google Cloud Console OAuth
#     CHROME_CLIENT_SECRET  — from Google Cloud Console OAuth
#     CHROME_REFRESH_TOKEN  — from Google Cloud Console OAuth
#   Firefox AMO:
#     FIREFOX_EXTENSION_ID  — our gecko UUID: {a6e584fb-ab9a-4299-8be4-9beb56d39a03}
#     FIREFOX_JWT_ISSUER    — from AMO API keys page
#     FIREFOX_JWT_SECRET    — from AMO API keys page

name: Release

on:
  # Manual dispatch supports two recovery cases:
  #   1. Re-submitting one store after a partial failure (e.g.,
  #      Chrome rejected with ITEM_NOT_UPDATABLE while Firefox
  #      accepted). Pick `chrome` or `firefox` for `target` to limit
  #      the run; `both` matches the tag-triggered default.
  #   2. Creating a missing GitHub Release after a tag-triggered run
  #      where every store rejected (so post-submit was skipped on
  #      old workflow definitions, or simply because the original tag
  #      push itself didn't fire the workflow). Set `create_release`
  #      to true. The tag name is derived from `extension/package.json`
  #      when the workflow ran against a branch, or read directly from
  #      `github.ref_name` when it ran against a tag ref.
  # Tag-triggered runs leave both inputs unset and behave as before.
  workflow_dispatch:
    inputs:
      target:
        description: "Which store(s) to submit to"
        type: choice
        options:
          - both
          - chrome
          - firefox
        default: both
      create_release:
        description: "Also create the GitHub Release (tag dispatches do this automatically)"
        type: boolean
        default: false
  # Pushing a tag like v1.0.1 also fires this — pairs naturally with
  # the local version-bump → sign → tag flow we use before publishing.
  # The version-vs-tag sanity-check below catches mismatches before
  # any zip/build/test work happens.
  push:
    tags:
      - "v*"

# Least-privilege: read the source for build/test/zip; write to
# `contents` so softprops/action-gh-release can create the GitHub
# Release and attach the extension zips. The job does NOT need
# permissions for issues, PRs, packages, or actions — those stay
# at their default no-access state.
permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    # Store credentials hoisted to job level so they're defined once
    # rather than duplicated on every step that needs them. `wxt submit`
    # and `wxt-publish-extension` both read these from the environment
    # directly — no .env.submit file is required on CI.
    env:
      CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
      FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
      FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
      # Optional submission flags. publish-extension would assume the
      # same defaults if these were omitted, but listing them here keeps
      # the submission posture (where it lands, whether it's reviewed,
      # which AMO channel) visible in the workflow itself rather than
      # buried in tool docs.
      #   CHROME_PUBLISH_TARGET=default     publish to public listing
      #   CHROME_SKIP_SUBMIT_REVIEW=false   submit for review (not draft-only)
      #   FIREFOX_CHANNEL=listed            public channel, not self-hosted
      CHROME_PUBLISH_TARGET: default
      CHROME_SKIP_SUBMIT_REVIEW: "false"
      FIREFOX_CHANNEL: listed
    steps:
      - uses: actions/checkout@v6

      # Tag-triggered runs MUST agree with extension/package.json's
      # version. A mismatch here means someone tagged without bumping
      # (or vice versa) — both stores reject re-uploads of an existing
      # version, so we'd waste an entire ~5-minute pipeline discovering
      # it at the `wxt submit` step. Fail fast instead. Manual
      # workflow_dispatch runs skip this check (no tag to compare).
      - name: Verify tag matches extension/package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(jq -r .version extension/package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match extension/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version check passed: tag v$TAG_VERSION matches extension/package.json $PKG_VERSION"

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      # --frozen-lockfile treats pnpm-lock.yaml as authoritative: if
      # package.json and the lockfile disagree the install fails. We
      # want the Store build to match exactly what was tested in the
      # pre-push hook on a developer machine.
      #
      # --ignore-scripts skips the extension's postinstall hook. That
      # hook is already guarded (no-ops when packages/logger/dist/
      # doesn't exist yet), but being explicit here keeps the step
      # order obvious: install → build logger → prepare → gates → zip.
      - name: Install dependencies (skip lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build logger package
        run: pnpm build:logger

      - name: Prepare WXT (generates .wxt/tsconfig.json the gates need)
        working-directory: extension
        run: pnpm exec wxt prepare

      # Same gates the pre-push lefthook enforces locally. Running them
      # here prevents a broken commit from slipping to the Chrome Web
      # Store via a release that skips local verification (e.g., a
      # --no-verify push, or a merge that accidentally bypasses hooks).
      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Markdown lint
        run: pnpm lint:md

      - name: Test
        run: pnpm -r test

      # `pnpm zip` runs the per-browser zip scripts in sequence —
      # Chrome first, then Firefox (which also produces the sources
      # ZIP that AMO review requires). Each per-browser script runs
      # `wxt zip` (which calls `wxt build` internally), so there is
      # no separate `pnpm build` step; that would only produce the
      # same artifacts twice.
      - name: Zip both extensions (chrome + firefox + sources)
        id: zip
        working-directory: extension
        run: pnpm zip

      # Dry-run first. Verifies the store credentials reach publish-
      # -extension correctly and the zip filenames scripts/submit.mjs
      # discovered match what the stores expect. If a secret is mistyped
      # or an extension ID changed, we fail here without consuming a
      # real submission review slot.
      #
      # Tag-triggered runs always submit to both stores (inputs.target
      # is unset, the case-default fires). Manual dispatch picks
      # chrome / firefox / both; the matching --chrome-only or
      # --firefox-only flag is forwarded to scripts/submit.mjs.
      - name: Dry-run submission (verify credentials)
        working-directory: extension
        env:
          TARGET: ${{ inputs.target || 'both' }}
        run: |
          case "$TARGET" in
            chrome)  node scripts/submit.mjs --dry-run --chrome-only ;;
            firefox) node scripts/submit.mjs --dry-run --firefox-only ;;
            both)    pnpm submit:dry-run ;;
            *)       echo "::error::Unknown target: $TARGET"; exit 1 ;;
          esac

      - name: Submit to stores
        working-directory: extension
        env:
          TARGET: ${{ inputs.target || 'both' }}
        run: |
          case "$TARGET" in
            chrome)  pnpm submit:chrome ;;
            firefox) pnpm submit:firefox ;;
            both)    pnpm submit ;;
            *)       echo "::error::Unknown target: $TARGET"; exit 1 ;;
          esac

      # Post-submit steps run on `!cancelled() && steps.zip.outcome ==
      # 'success'` so a partial submit failure (e.g., Chrome rejected
      # with ITEM_NOT_UPDATABLE while Firefox went through) still
      # produces the workflow artifacts and the GitHub Release. The
      # zips were already built; the Release attaches them for
      # sideloading regardless of store-side outcome.
      - name: Upload artifacts
        if: ${{ !cancelled() && steps.zip.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: extension-zips
          # `extension/.output/` starts with a dot, so actions/glob
          # (used by upload-artifact) treats it as hidden and skips
          # everything inside unless include-hidden-files is true.
          # softprops/action-gh-release uses different glob semantics
          # and does not need this flag, which is why Create Release
          # finds the same files even when this flag is omitted.
          include-hidden-files: true
          path: |
            extension/.output/*-chrome.zip
            extension/.output/*-firefox.zip
            extension/.output/*-sources.zip

      # Extract the matching `## [<version>]` section from CHANGELOG.md
      # for use as the GitHub Release body. The literal-prefix match
      # via `index() == 1` sidesteps a gawk regex pitfall: `\[` inside
      # an awk string is silently stripped to plain `[`, which turns
      # `[1.1.0]` into a regex character class (matching one of `1`,
      # `.`, `0`) instead of a literal-bracket match — so the regex
      # form would never match the version header and would fail this
      # step on every run. `index()` matches a literal substring,
      # unambiguously. Walks from the header through to the next
      # `## [` (or EOF). Failing the step when no section matches
      # prevents shipping a release with empty notes — the most common
      # cause is forgetting to land the changelog entry before tagging.
      # Determine the tag name to release as. On tag-triggered runs,
      # github.ref_name already is the tag (e.g., v1.1.0). On manual
      # branch dispatches with create_release=true, fall back to the
      # version in extension/package.json (e.g., "1.1.0" -> "v1.1.0").
      # softprops/action-gh-release uses the tag if it exists in git
      # and creates one at the current commit otherwise — for the
      # branch-dispatch recovery case, the tag is expected to already
      # exist (you are recreating a missing Release for an existing
      # tagged version).
      - name: Determine release tag
        id: release_tag
        if: ${{ !cancelled() && steps.zip.outcome == 'success' && (github.ref_type == 'tag' || inputs.create_release) }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r .version extension/package.json)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section for release notes
        if: ${{ !cancelled() && steps.zip.outcome == 'success' && (github.ref_type == 'tag' || inputs.create_release) }}
        run: |
          VERSION="${{ steps.release_tag.outputs.version }}"
          awk -v ver="$VERSION" '
            BEGIN { hdr = "## [" ver "]" }
            index($0, hdr) == 1 { found=1; print; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION. Add a '## [$VERSION] — YYYY-MM-DD' entry before tagging."
            exit 1
          fi
          echo "Extracted $(wc -l < release-notes.md) lines of release notes for v$VERSION"

      # Create the GitHub Release and attach the Chrome and Firefox
      # zips for sideloading. Sources zip is included for transparency
      # (it is what AMO reviewers receive). The default GITHUB_TOKEN
      # — granted via `contents: write` above — has the minimal
      # privilege needed; no PAT is required.
      - name: Create GitHub Release with sideloadable assets
        if: ${{ !cancelled() && steps.zip.outcome == 'success' && (github.ref_type == 'tag' || inputs.create_release) }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ButterSwitch ${{ steps.release_tag.outputs.tag }}
          body_path: release-notes.md
          files: |
            extension/.output/*-chrome.zip
            extension/.output/*-firefox.zip
            extension/.output/*-sources.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
