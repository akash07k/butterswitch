# Runs the three hard gates (typecheck, test, lint) on every pull
# request and every push to main. Mirrors what the pre-push lefthook
# runs locally so a --no-verify push can't sneak broken code through.
#
# release.yml runs the SAME gates on manual dispatch before submitting
# to the Chrome Web Store and Firefox AMO. This workflow is the first
# line of defence; release.yml is the second.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege: gates need to read the tree and write nothing.
permissions:
  contents: read

# Cancel any in-flight run for the same ref when a new commit arrives.
# Wasted compute on rapid pushes was the most common complaint on the
# old setup; this drops it to zero.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      # --ignore-scripts skips the extension's `postinstall: wxt prepare`
      # hook. That hook loads wxt.config.ts which transitively imports
      # @butterswitch/logger — a workspace package that resolves to
      # packages/logger/dist/index.js via its `exports` field. On a fresh
      # clone the dist/ doesn't exist yet, so the import fails with
      # "No exports main defined". We build the logger first, then run
      # wxt prepare manually once dist/ is present.
      - name: Install dependencies (skip lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build logger package
        run: pnpm build:logger

      - name: Prepare WXT (generates .wxt/tsconfig.json the extension typecheck needs)
        working-directory: extension
        run: pnpm exec wxt prepare

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm -r test
