pre-commit:
  commands:
    lint-staged:
      run: pnpm exec lint-staged

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm -r typecheck
    test:
      run: pnpm -r test
    lint:
      run: pnpm lint
